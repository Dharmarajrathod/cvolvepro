services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cvolvepro
      POSTGRES_USER: cvolve
      POSTGRES_PASSWORD: cvolve
    volumes: [postgres_data:/var/lib/postgresql/data]
  api:
    build: ./backend
    environment:
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-nvidia/nemotron-3-super-120b-a12b}
      DATABASE_URL: postgresql+asyncpg://cvolve:cvolve@db/cvolvepro
      ALLOWED_ORIGINS: http://localhost:3000
      MAX_RESULTS: ${MAX_RESULTS:-150}
      RESULTS_PER_REGION: ${RESULTS_PER_REGION:-12}
      SEARCH_CONCURRENCY: ${SEARCH_CONCURRENCY:-4}
      SEARCH_SCOPE_LIMIT: ${SEARCH_SCOPE_LIMIT:-8}
      MAX_JOB_AGE_DAYS: ${MAX_JOB_AGE_DAYS:-365}
    ports: ["8000:8000"]
    depends_on: [db]
  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [api]
volumes:
  postgres_data:
